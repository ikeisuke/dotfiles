# Modern tmux configuration
# =========================
# Modular setup for macOS + Linux with session persistence

# Core settings
set -g prefix C-z
unbind C-b
bind C-z send-prefix

# Enable mouse support
set -g mouse on

# Mouse copy/paste behavior (OS-specific)
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# macOS: Right-click to paste from system clipboard
# Linux/WSL: Right-click to copy to selection
if-shell "uname | grep -q Darwin" \
  "bind-key -n MouseDown3Pane run 'tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer'" \
  "bind -T copy-mode-vi MouseDown3Pane send-keys -X copy-selection-and-cancel"

# Use vi mode
setw -g mode-keys vi

# Fix ESC delay in vim
set -s escape-time 0

# Increase history
set -g history-limit 50000

# Enable focus events for vim
set -g focus-events on

# Truecolor support (24-bit color)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable clipboard
set -g set-clipboard on

# Use login shell to load ~/.bash_profile
set -g default-command "${SHELL} -l"

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Load modular configuration
# XDG: ~/.config/tmux/tmux.conf → symlink to this file
# source-file uses the real path (where this file lives)
run-shell 'TMUX_DIR="$(dirname "$(readlink ~/.config/tmux/tmux.conf || echo ~/.config/tmux/tmux.conf)")"; \
  tmux source-file "$TMUX_DIR/base.conf"; \
  tmux source-file "$TMUX_DIR/keys.conf"; \
  tmux source-file "$TMUX_DIR/theme.conf"; \
  tmux source-file "$TMUX_DIR/plugins.conf"; \
  if [ "$(uname -s)" = "Darwin" ]; then tmux source-file "$TMUX_DIR/macos.conf"; fi; \
  if [ "$(uname -s)" = "Linux" ]; then tmux source-file "$TMUX_DIR/linux.conf"; fi'
