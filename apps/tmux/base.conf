# Base tmux configuration
# Cross-platform settings

# Display settings
set -g display-time 4000
set -g status-interval 5

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Aggressive resize (useful for grouped sessions)
# Note: Disabled because it's incompatible with iTerm2 integration (tmux -CC)
# setw -g aggressive-resize on

# Enable terminal titles
set -g set-titles on
set -g set-titles-string "#T"

# Automatic window naming
setw -g automatic-rename on
setw -g automatic-rename-format "#{b:pane_current_command} #{b:pane_current_path}"
