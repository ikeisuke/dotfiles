# Plugin configuration
# Managed by TPM (Tmux Plugin Manager)

# Plugin list
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin settings

# tmux-resurrect: Restore pane contents
set -g @resurrect-capture-pane-contents 'on'

# tmux-resurrect: Restore vim sessions (if using vim-obsession)
set -g @resurrect-strategy-vim 'session'

# tmux-continuum: Auto-restore on tmux start
set -g @continuum-restore 'on'

# tmux-continuum: Auto-save interval (minutes)
set -g @continuum-save-interval '15'

# tmux-yank: Use system clipboard
set -g @yank_selection_mouse 'clipboard'

# Initialize TPM (keep this at the very bottom)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'
run '~/.config/tmux/plugins/tpm/tpm'
