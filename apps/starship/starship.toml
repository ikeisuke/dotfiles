# Starship configuration
# https://starship.rs/config/

# Single-line prompt format (time is shown by zsh hook above prompt)
format = "$directory$git_branch$git_status$character"

# Command duration (disabled - using zsh hook instead)
[cmd_duration]
disabled = true

# Directory module
[directory]
truncation_length = 3
truncate_to_repo = true
style = 'bold cyan'

# Git branch
[git_branch]
symbol = ''
style = 'bold purple'
format = '[$symbol $branch]($style) '

# Git status (simplified)
[git_status]
disabled = false
format = '([$all_status$ahead_behind]($style) )'
style = 'bold red'
conflicted = '='
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
untracked = '?${count}'
stashed = '*${count}'
modified = '!${count}'
staged = '+${count}'
renamed = '»${count}'
deleted = '✘${count}'

# Character (prompt symbol)
[character]
success_symbol = '[%](bold green)'
error_symbol = '[%](bold red)'

# Disable modules we don't need
[aws]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[package]
disabled = true
